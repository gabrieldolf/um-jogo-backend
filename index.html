<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MMO Top-Down Tela Cheia com Zoom Ajustado</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #111;
            font-family: sans-serif;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 13px;
            color: #fff;
            pointer-events: none;
            text-align: center;
            z-index: 10;
            white-space: nowrap;
        }
        canvas {
            display: block;
            background: #152515;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="hud"><strong>Modo MMO:</strong> Toque ou clique em qualquer lugar para andar</div>
    <canvas id="gameCanvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let players = {};
        
        const WORLD_WIDTH = 2000;
        const WORLD_HEIGHT = 2000;

        // AJUSTADO: Reduzido de 1000 para 700 para aproximar a câmera em 30% em telas pequenas (celulares)
        const TARGET_VIEW_WIDTH = 700; 
        let gameScale = 1;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Se a tela for menor que 700px (celular em pé), aproxima dinamicamente mantendo a proporção ideal
            if (window.innerWidth < TARGET_VIEW_WIDTH) {
                gameScale = window.innerWidth / TARGET_VIEW_WIDTH;
            } else {
                gameScale = 1; // Monitores e telas grandes mantêm o zoom padrão mais amplo
            }
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        socket.on('currentPlayers', (serverPlayers) => { players = serverPlayers; });
        socket.on('positionsUpdate', (serverPlayers) => { players = serverPlayers; });
        
        socket.on('playerNewOrder', (data) => {
            if(players[data.id]) {
                players[data.id].targetX = data.targetX;
                players[data.id].targetY = data.targetY;
                players[data.id].isMoving = true;
            }
        });

        socket.on('playerDisconnected', (id) => { delete players[id]; });

        function handleInput(event) {
            const rect = canvas.getBoundingClientRect();
            const clientX = event.clientX || (event.touches && event.touches[0].clientX);
            const clientY = event.clientY || (event.touches && event.touches[0].clientY);
            if (!clientX || !clientY) return;

            const screenClickX = clientX - rect.left;
            const screenClickY = clientY - rect.top;

            let localPlayer = players[socket.id];
            if (!localPlayer) return;

            const virtualWidth = canvas.width / gameScale;
            const virtualHeight = canvas.height / gameScale;

            let cameraX = localPlayer.x - virtualWidth / 2;
            let cameraY = localPlayer.y - virtualHeight / 2;

            cameraX = Math.max(0, Math.min(cameraX, WORLD_WIDTH - virtualWidth));
            cameraY = Math.max(0, Math.min(cameraY, WORLD_HEIGHT - virtualHeight));

            const worldClickX = (screenClickX / gameScale) + cameraX;
            const worldClickY = (screenClickY / gameScale) + cameraY;

            socket.emit('rtsMoveOrder', { x: worldClickX, y: worldClickY });
        }

        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            handleInput(e);
        }, { passive: false });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.scale(gameScale, gameScale);

            let localPlayer = players[socket.id];
            
            const virtualWidth = canvas.width / gameScale;
            const virtualHeight = canvas.height / gameScale;

            let cameraX = 0;
            let cameraY = 0;

            if (localPlayer) {
                cameraX = localPlayer.x - virtualWidth / 2;
                cameraY = localPlayer.y - virtualHeight / 2;

                cameraX = Math.max(0, Math.min(cameraX, WORLD_WIDTH - virtualWidth));
                cameraY = Math.max(0, Math.min(cameraY, WORLD_HEIGHT - virtualHeight));
            }

            // GRADE DO CENÁRIO
            ctx.strokeStyle = '#253825';
            ctx.lineWidth = 1;
            const gridSize = 100;
            
            for (let x = 0; x <= WORLD_WIDTH; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x - cameraX, 0 - cameraY);
                ctx.lineTo(x - cameraX, WORLD_HEIGHT - cameraY);
                ctx.stroke();
            }
            for (let y = 0; y <= WORLD_HEIGHT; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0 - cameraX, y - cameraY);
                ctx.lineTo(WORLD_WIDTH - cameraX, y - cameraY);
                ctx.stroke();
            }

            // DESENHO DOS JOGADORES
            for (let id in players) {
                let p = players[id];
                let screenX = p.x - cameraX;
                let screenY = p.y - cameraY;

                if (screenX >= -40 && screenX <= virtualWidth + 40 && screenY >= -40 && screenY <= virtualHeight + 40) {
                    
                    if (p.isMoving) {
                        ctx.strokeStyle = p.color;
                        ctx.setLineDash([4, 4]); // Mantive a linha tracejada discreta original
                        ctx.beginPath();
                        ctx.moveTo(screenX, screenY);
                        ctx.lineTo(p.targetX - cameraX, p.targetY - cameraY);
                        ctx.stroke();
                        ctx.setLineDash([]); 
                    }

                    ctx.fillStyle = p.color;
                    ctx.fillRect(screenX - 15, screenY - 15, 30, 30); 

                    if (id === socket.id) {
                        ctx.strokeStyle = '#ffd700';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(screenX - 17, screenY - 17, 34, 34);
                    }
                }
            }

            ctx.restore();
            requestAnimationFrame(draw);
        }
        requestAnimationFrame(draw);
    </script>
</body>
</html>
