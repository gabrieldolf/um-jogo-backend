<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <!-- Configuração mobile definitiva para congelar o zoom e rolagem indesejada -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MMO Top-Down Tela Cheia</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* Impede que o jogador fique selecionando textos sem querer no mobile */
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Remove as barras de rolagem do navegador */
            background: #111;
            font-family: sans-serif;
        }
        /* HUD fixa no topo para dar instruções sem atrapalhar o jogo */
        #hud {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 13px;
            color: #fff;
            pointer-events: none; /* Cliques passam direto por ela e vão para o canvas */
            text-align: center;
            z-index: 10;
            white-space: nowrap;
        }
        canvas {
            display: block;
            background: #152515;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="hud"><strong>Modo MMO:</strong> Toque ou clique em qualquer lugar para andar</div>
    <canvas id="gameCanvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let players = {};
        
        const WORLD_WIDTH = 2000;
        const WORLD_HEIGHT = 2000;

        // FUNÇÃO DE REDIMENSIONAMENTO AUTOMÁTICO
        function resizeCanvas() {
            // Define o tamanho de desenho interno do canvas igual ao tamanho real da janela do navegador
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        // Escuta se a janela mudou de tamanho ou se o celular girou
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas(); // Executa a primeira vez ao abrir o jogo

        socket.on('currentPlayers', (serverPlayers) => { players = serverPlayers; });
        socket.on('positionsUpdate', (serverPlayers) => { players = serverPlayers; });
        
        socket.on('playerNewOrder', (data) => {
            if(players[data.id]) {
                players[data.id].targetX = data.targetX;
                players[data.id].targetY = data.targetY;
                players[data.id].isMoving = true;
            }
        });

        socket.on('playerDisconnected', (id) => { delete players[id]; });

        function handleInput(event) {
            const rect = canvas.getBoundingClientRect();
            const clientX = event.clientX || (event.touches && event.touches[0].clientX);
            const clientY = event.clientY || (event.touches && event.touches[0].clientY);
            if (!clientX || !clientY) return;

            // Como o canvas agora é 1:1 com a tela, o cálculo fica mais direto
            const canvasClickX = clientX - rect.left;
            const canvasClickY = clientY - rect.top;

            let localPlayer = players[socket.id];
            if (!localPlayer) return;

            // Calcula a câmera usando o tamanho atualizado e dinâmico da tela do dispositivo
            let cameraX = localPlayer.x - canvas.width / 2;
            let cameraY = localPlayer.y - canvas.height / 2;

            // Previne que a câmera passe dos limites máximos do mapa de 2000x2000
            cameraX = Math.max(0, Math.min(cameraX, WORLD_WIDTH - canvas.width));
            cameraY = Math.max(0, Math.min(cameraY, WORLD_HEIGHT - canvas.height));

            const worldClickX = canvasClickX + cameraX;
            const worldClickY = canvasClickY + cameraY;

            socket.emit('rtsMoveOrder', { x: worldClickX, y: worldClickY });
        }

        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            handleInput(e);
        }, { passive: false });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let localPlayer = players[socket.id];
            let cameraX = 0;
            let cameraY = 0;

            if (localPlayer) {
                cameraX = localPlayer.x - canvas.width / 2;
                cameraY = localPlayer.y - canvas.height / 2;

                cameraX = Math.max(0, Math.min(cameraX, WORLD_WIDTH - canvas.width));
                cameraY = Math.max(0, Math.min(cameraY, WORLD_HEIGHT - canvas.height));
            }

            // GRADE DO CENÁRIO (Adaptável para qualquer resolução)
            ctx.strokeStyle = '#253825';
            ctx.lineWidth = 1;
            const gridSize = 100;
            
            for (let x = 0; x <= WORLD_WIDTH; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x - cameraX, 0 - cameraY);
                ctx.lineTo(x - cameraX, WORLD_HEIGHT - cameraY);
                ctx.stroke();
            }
            for (let y = 0; y <= WORLD_HEIGHT; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0 - cameraX, y - cameraY);
                ctx.lineTo(WORLD_WIDTH - cameraX, y - cameraY);
                ctx.stroke();
            }

            // DESENHO DOS JOGADORES
            for (let id in players) {
                let p = players[id];
                let screenX = p.x - cameraX;
                let screenY = p.y - cameraY;

                // Otimização de renderização de acordo com o tamanho dinâmico do canvas
                if (screenX >= -20 && screenX <= canvas.width + 20 && screenY >= -20 && screenY <= canvas.height + 20) {
                    
                    if (p.isMoving) {
                        ctx.strokeStyle = p.color;
                        ctx.setLineDash([4, 4]);
                        ctx.beginPath();
                        ctx.moveTo(screenX, screenY);
                        ctx.lineTo(p.targetX - cameraX, p.targetY - cameraY);
                        ctx.stroke();
                        ctx.setLineDash([]); 
                    }

                    ctx.fillStyle = p.color;
                    ctx.fillRect(screenX - 15, screenY - 15, 30, 30); // Aumentei um pouquinho o tamanho (30px) para melhorar visualização no celular

                    if (id === socket.id) {
                        ctx.strokeStyle = '#ffd700';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(screenX - 17, screenY - 17, 34, 34);
                    }
                }
            }
            requestAnimationFrame(draw);
        }
        requestAnimationFrame(draw);
    </script>
</body>
</html>
