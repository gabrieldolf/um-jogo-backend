<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MMO Top-Down Profissional</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #111; font-family: sans-serif; }
        #hud { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.7); padding: 8px 15px; border-radius: 20px; font-size: 13px; color: #fff; pointer-events: none; text-align: center; z-index: 10; white-space: nowrap; }
        canvas { display: block; background: #2c4c2c; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="hud"><strong>MMO Separado:</strong> Estrutura limpa em arquivos externos!</div>
    <canvas id="gameCanvas"></canvas>

    <!-- Importação das bibliotecas e dos novos arquivos lógicos separados -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="conexao.js"></script>
    <script src="jogo.js"></script>
</body>
</html>
