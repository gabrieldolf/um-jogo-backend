<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Protótipo RTS Multiplayer Grátis</title>
    <style>
        canvas { border: 2px solid black; background: #e0e0e0; cursor: crosshair; }
        body { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; background: #222; color: white; }
        p { margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>

<p><strong>Comando RTS:</strong> Clique com o botão esquerdo em qualquer lugar do mapa para mover seu quadrado.</p>
<canvas id="gameCanvas" width="500" height="500"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io(); 
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let players = {};

    // Sincronização direta com o estado do servidor
    socket.on('currentPlayers', (serverPlayers) => { players = serverPlayers; });
    socket.on('positionsUpdate', (serverPlayers) => { players = serverPlayers; });
    
    socket.on('playerNewOrder', (data) => {
        if(players[data.id]) {
            players[data.id].targetX = data.targetX;
            players[data.id].targetY = data.targetY;
            players[data.id].isMoving = true;
        }
    });

    socket.on('playerDisconnected', (id) => { delete players[id]; });

    // Escuta o clique do mouse na tela do jogo
    canvas.addEventListener('mousedown', (event) => {
        const rect = canvas.getBoundingClientRect();
        // Calcula a posição exata do clique descontando as bordas da tela
        const clickX = event.clientX - rect.left;
        const clickY = event.clientY - rect.top;

        // Envia a ordem de movimento para o servidor
        socket.emit('rtsMoveOrder', { x: clickX, y: clickY });
    });

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        for (let id in players) {
            let p = players[id];

            // Desenha uma linha discreta até o destino se a unidade estiver andando
            if (p.isMoving) {
                ctx.strokeStyle = p.color;
                ctx.setLineDash([4, 4]);
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.targetX, p.targetY);
                ctx.stroke();
                ctx.setLineDash([]); // Reseta linha tracejada
            }

            // Desenha a unidade (quadrado)
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x - 10, p.y - 10, 20, 20); // Centraliza o quadrado no ponto (x,y)

            // Coloca uma borda dourada se for o quadrado do próprio jogador
            if (id === socket.id) {
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 2;
                ctx.strokeRect(p.x - 11, p.y - 11, 22, 22);
            }
        }
        requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);
</script>
</body>
</html>
