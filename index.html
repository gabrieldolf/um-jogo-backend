<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MMO Top-Down Animado</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #111;
            font-family: sans-serif;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 13px;
            color: #fff;
            pointer-events: none;
            text-align: center;
            z-index: 10;
            white-space: nowrap;
        }
        canvas {
            display: block;
            background: #2c4c2c; /* Grama ligeiramente mais clara para contrastar com o herói */
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="hud"><strong>MMO Animado:</strong> Clique para andar. O personagem vira e caminha!</div>
    <canvas id="gameCanvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let players = {};
        
        const WORLD_WIDTH = 2000;
        const WORLD_HEIGHT = 2000;
        const TARGET_VIEW_WIDTH = 700; 
        let gameScale = 1;

        // CARREGAMENTO DA IMAGEM DO PERSONAGEM (Spritesheet)
        const spriteSheet = new Image();
        // Usando uma folha de sprites padrão de 4 direções (Baixo, Esquerda, Direita, Cima)
        spriteSheet.src = 'https://githubusercontent.com';

        // Configurações do arquivo de imagem (Cada bonequinho nessa imagem tem 32x32 pixels)
        const FRAME_WIDTH = 32;
        const FRAME_HEIGHT = 32;
        
        // Variáveis de controle da velocidade da animação local
        let animationFrameCount = 0;
        let currentAnimationFrame = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (window.innerWidth < TARGET_VIEW_WIDTH) {
                gameScale = window.innerWidth / TARGET_VIEW_WIDTH;
            } else {
                gameScale = 1;
            }
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        socket.on('currentPlayers', (serverPlayers) => { players = serverPlayers; });
        socket.on('positionsUpdate', (serverPlayers) => { players = serverPlayers; });
        
        socket.on('playerNewOrder', (data) => {
            if(players[data.id]) {
                players[data.id].targetX = data.targetX;
                players[data.id].targetY = data.targetY;
                players[data.id].isMoving = true;
            }
        });

        socket.on('playerDisconnected', (id) => { delete players[id]; });

        function handleInput(event) {
            const rect = canvas.getBoundingClientRect();
            const clientX = event.clientX || (event.touches && event.touches.clientX);
            const clientY = event.clientY || (event.touches && event.touches.clientY);
            if (!clientX || !clientY) return;

            const screenClickX = clientX - rect.left;
            const screenClickY = clientY - top;

            let localPlayer = players[socket.id];
            if (!localPlayer) return;

            const virtualWidth = canvas.width / gameScale;
            const virtualHeight = canvas.height / gameScale;

            let cameraX = localPlayer.x - virtualWidth / 2;
            let cameraY = localPlayer.y - virtualHeight / 2;

            cameraX = Math.max(0, Math.min(cameraX, WORLD_WIDTH - virtualWidth));
            cameraY = Math.max(0, Math.min(cameraY, WORLD_HEIGHT - virtualHeight));

            const worldClickX = (screenClickX / gameScale) + cameraX;
            const worldClickY = (screenClickY / gameScale) + cameraY;

            socket.emit('rtsMoveOrder', { x: worldClickX, y: worldClickY });
        }

        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            handleInput(e);
        }, { passive: false });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.scale(gameScale, gameScale);

            let localPlayer = players[socket.id];
            const virtualWidth = canvas.width / gameScale;
            const virtualHeight = canvas.height / gameScale;

            let cameraX = 0;
            let cameraY = 0;

            if (localPlayer) {
                cameraX = localPlayer.x - virtualWidth / 2;
                cameraY = localPlayer.y - virtualHeight / 2;
                cameraX = Math.max(0, Math.min(cameraX, WORLD_WIDTH - virtualWidth));
                cameraY = Math.max(0, Math.min(cameraY, WORLD_HEIGHT - virtualHeight));
            }

            // GRADE DO CENÁRIO
            ctx.strokeStyle = '#375737';
            ctx.lineWidth = 1;
            const gridSize = 100;
            
            for (let x = 0; x <= WORLD_WIDTH; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x - cameraX, 0 - cameraY);
                ctx.lineTo(x - cameraX, WORLD_HEIGHT - cameraY);
                ctx.stroke();
            }
            for (let y = 0; y <= WORLD_HEIGHT; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0 - cameraX, y - cameraY);
                ctx.lineTo(WORLD_WIDTH - cameraX, y - cameraY);
                ctx.stroke();
            }

            // ATUALIZAÇÃO DOS FRAMES DE ANIMAÇÃO (Roda a cada quadro desenhado)
            animationFrameCount++;
            if (animationFrameCount >= 10) { // Muda de passo a cada 10 frames do monitor (controla a velocidade do passo)
                currentAnimationFrame = (currentAnimationFrame + 1) % 4; // Avança entre as colunas 0, 1, 2, 3
                animationFrameCount = 0;
            }

            // DESENHO DOS JOGADORES ANIMADOS
            for (let id in players) {
                let p = players[id];
                let screenX = p.x - cameraX;
                let screenY = p.y - cameraY;

                if (screenX >= -40 && screenX <= virtualWidth + 40 && screenY >= -40 && screenY <= virtualHeight + 40) {
                    
                    // Desenha linha discreta até o alvo
                    if (p.isMoving) {
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                        ctx.beginPath();
                        ctx.moveTo(screenX, screenY);
                        ctx.lineTo(p.targetX - cameraX, p.targetY - cameraY);
                        ctx.stroke();
                    }

                    // DETERMINAÇÃO DA DIREÇÃO (Qual linha da imagem ler)
                    let directionLine = 0; // 0 = Olhando para Baixo
                    
                    if (p.isMoving) {
                        let dx = p.targetX - p.x;
                        let dy = p.targetY - p.y;

                        // Verifica se o movimento é mais horizontal ou vertical
                        if (Math.abs(dx) > Math.abs(dy)) {
                            directionLine = dx > 0 ? 2 : 1; // 2 = Direita, 1 = Esquerda
                        } else {
                            directionLine = dy > 0 ? 0 : 3; // 0 = Baixo, 3 = Cima
                        }
                    }

                    // Se estiver parado, congela no frame central da animação (Coluna 0)
                    let colFrame = p.isMoving ? currentAnimationFrame : 0;

                    // DESENHA A IMAGEM RECORTADA NO CANVAS
                    // Parâmetros: imagem, cortarX, cortarY, cortarLargura, cortarAltura, telaX, telaY, telaLargura, telaAltura
                    ctx.drawImage(
                        spriteSheet,
                        colFrame * FRAME_WIDTH,       // Posição X do recorte na folha de imagem
                        directionLine * FRAME_HEIGHT, // Posição Y do recorte (Direção)
                        FRAME_WIDTH, FRAME_HEIGHT,    // Tamanho do recorte
                        screenX - 24, screenY - 24,   // Onde desenhar na tela (Centralizado)
                        48, 48                        // Tamanho final expandido do herói na tela (48x48 pixels)
                    );

                    // Indicador circular dourado sob os pés do jogador local em vez do quadrado
                    if (id === socket.id) {
                        ctx.strokeStyle = '#ffd700';
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.arc(screenX, screenY + 12, 16, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                }
            }

            ctx.restore();
            requestAnimationFrame(draw);
        }
        
        // Garante que o jogo comece a desenhar somente após a imagem carregar na memória
        spriteSheet.onload = () => {
            requestAnimationFrame(draw);
        };
    </script>
</body>
</html>
